  <style>
    .flutter-loader {
      width: 100%;
      height: 6px;
      background-color: #13B9FD;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      overflow: hidden;
    }

    .indeterminate {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .indeterminate:before {
      content: '';
      position: absolute;
      height: 100%;
      background-color: #0175C2;
      animation: indeterminate_first 2s infinite ease-out;
    }

    .indeterminate:after {
      content: '';
      position: absolute;
      height: 100%;
      background-color: #02569B;
      animation: indeterminate_second 2s infinite ease-in;
    }

    @keyframes indeterminate_first {
      0% {
        left: -100%;
        width: 100%;
      }

      100% {
        left: 100%;
        width: 10%;
      }
    }

    @keyframes indeterminate_second {
      0% {
        left: -150%;
        width: 100%;
      }

      100% {
        left: 100%;
        width: 10%;
      }
    }
  </style>
